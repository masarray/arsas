name: Engineering feature request
description: Propose a bounded ARSAS workflow, evidence, usability or diagnostic improvement.
title: "[Feature] "
labels: ["enhancement", "needs-evidence"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the engineering problem before proposing the UI. Protocol behavior belongs in ARIEC61850; ARSAS should consume typed engine services.
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options: [MMS and model discovery, Reporting and RCB, Multi-IED monitoring, GOOSE, File transfer and COMTRADE, SCL, Control, Diagnostics, Packaging and update, Website and guidance, Other]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Engineering problem
      description: Describe the current workflow, blocker and affected role without naming confidential projects.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Current evidence and workaround
      description: Include protocol objects, service sequence, sanitized diagnostics or repeatable examples.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired bounded outcome
      description: State what should become visible, repeatable or exportable. Avoid universal vendor claims.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - Given...
        - When...
        - Then...
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Application and engine boundary
      description: Identify whether the request needs an ARIEC61850 contract, an ARSAS-only change or both.
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: This request contains no credentials or confidential project, employer or device material.
          required: true
        - label: I understand roadmap inclusion and timing are not guaranteed.
          required: true
