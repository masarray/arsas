name: Apply premium P0 UI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'fix/premium-p0-ui' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/premium-p0-ui
          fetch-depth: 0

      - name: Assemble premium source bundle
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.staging/premium-p0/part-05')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'PdttiI+yo': 'PdktiI+yo',
              'KVTbinYV': 'KVTBinYV',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected exactly one staging typo {old!r}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
          cat .staging/premium-p0/part-* > .staging/premium-p0-assembled.zlib.b64
          wc -c .staging/premium-p0-assembled.zlib.b64
          sha256sum .staging/premium-p0-assembled.zlib.b64

      - name: Upload assembled bundle evidence
        uses: actions/upload-artifact@v4
        with:
          name: premium-p0-assembled-bundle
          path: .staging/premium-p0-assembled.zlib.b64
          if-no-files-found: error

      - name: Decode and validate premium source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib, json, zlib

          payload = Path('.staging/premium-p0-assembled.zlib.b64').read_text(encoding='utf-8').strip()
          compressed = base64.b64decode(payload, validate=True)
          digest = hashlib.sha256(compressed).hexdigest()
          expected_digest = '34d0b9930f3dcebc8bdb8027225c17dc250e98d4cfabf59ea1639c80c4b8fe86'
          if digest != expected_digest:
              raise SystemExit(f'Premium P0 payload digest mismatch: {digest}')

          files = json.loads(zlib.decompress(compressed).decode('utf-8'))
          expected = {'App.xaml', 'MainWindow.xaml', 'SaveSclWindow.xaml', 'SaveSclWindow.xaml.cs'}
          if set(files) != expected:
              raise SystemExit(f'Unexpected bundle files: {sorted(files)}')
          for path, content in files.items():
              Path(path).write_text(content, encoding='utf-8')
          PY

          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          for path in ('App.xaml', 'MainWindow.xaml', 'SaveSclWindow.xaml'):
              ET.parse(path)
          PY

          grep -q 'x:Name="EditionIndicator"' SaveSclWindow.xaml
          grep -q 'Content="Edition 2"' SaveSclWindow.xaml
          grep -q 'Content="Edition 1"' SaveSclWindow.xaml
          ! grep -q '<ComboBox' SaveSclWindow.xaml
          ! grep -q 'Schema V' SaveSclWindow.xaml
          ! grep -q '>3.1<' SaveSclWindow.xaml
          ! grep -q '>1.6<' SaveSclWindow.xaml
          grep -q 'HorizontalAlignment="Center"' MainWindow.xaml
          grep -q 'LucideRefreshCw' MainWindow.xaml
          grep -q 'ScrollViewer.HorizontalScrollBarVisibility="Disabled"' MainWindow.xaml
          grep -q 'CanUserResizeColumns="False"' MainWindow.xaml
          grep -q 'ClipToBounds="True"' MainWindow.xaml
          grep -q 'Content="{Binding ControlPendingConfirmationLabel}"' MainWindow.xaml
          ! grep -q 'Content="Confirm Open"' MainWindow.xaml
          ! grep -q 'Content="Confirm Close"' MainWindow.xaml

      - name: Create atomic production commit
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/premium-p0-ui
        shell: bash
        run: |
          set -euo pipefail
          repo="repos/$GITHUB_REPOSITORY"
          base_commit=$(git rev-parse HEAD)
          base_tree=$(gh api "$repo/git/commits/$base_commit" --jq .tree.sha)
          tree_entries='[]'

          add_blob() {
            local path="$1"
            local blob
            blob=$(base64 -w0 "$path" | jq -Rs '{content:.,encoding:"base64"}' | gh api --method POST "$repo/git/blobs" --input - --jq .sha)
            tree_entries=$(jq --arg path "$path" --arg sha "$blob" '. + [{path:$path,mode:"100644",type:"blob",sha:$sha}]' <<<"$tree_entries")
          }

          add_blob App.xaml
          add_blob MainWindow.xaml
          add_blob SaveSclWindow.xaml
          add_blob SaveSclWindow.xaml.cs

          tree_sha=$(jq -n --arg base_tree "$base_tree" --argjson tree "$tree_entries" '{base_tree:$base_tree,tree:$tree}' | gh api --method POST "$repo/git/trees" --input - --jq .sha)
          commit_sha=$(jq -n --arg message "feat: deliver premium P0 control and SCL UX" --arg tree "$tree_sha" --arg parent "$base_commit" '{message:$message,tree:$tree,parents:[$parent]}' | gh api --method POST "$repo/git/commits" --input - --jq .sha)
          jq -n --arg sha "$commit_sha" '{sha:$sha,force:false}' | gh api --method PATCH "$repo/git/refs/heads/$TARGET_BRANCH" --input - >/dev/null
          echo "Published $commit_sha"
