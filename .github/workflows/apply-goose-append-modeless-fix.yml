name: Apply GOOSE append and modeless correction

on:
  push:
    branches:
      - fix/goose-append-modeless-selection-v2
    paths:
      - scripts/apply-goose-append-modeless-fix.py
      - .github/workflows/apply-goose-append-modeless-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/goose-append-modeless-selection-v2
          fetch-depth: 0

      - name: Apply requested corrections
        run: python3 scripts/apply-goose-append-modeless-fix.py

      - name: Commit generated changes
        shell: bash
        run: |
          if git diff --quiet -- MainWindow.GooseTimeline.cs MainWindow.GooseSubscriber.cs MainWindow.xaml.cs MainWindow.xaml App.xaml SignalSelectionWizardWindow.xaml.cs Views/GooseSubscriberLiteView.xaml .github/workflows/build.yml; then
            echo "No generated changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MainWindow.GooseTimeline.cs MainWindow.GooseSubscriber.cs MainWindow.xaml.cs MainWindow.xaml App.xaml SignalSelectionWizardWindow.xaml.cs Views/GooseSubscriberLiteView.xaml .github/workflows/build.yml
          git commit -m "fix: append GOOSE events and keep discovery workspace interactive"
          git push origin HEAD:fix/goose-append-modeless-selection-v2
