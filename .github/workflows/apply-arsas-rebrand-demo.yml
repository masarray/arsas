name: Apply ARSAS rebrand and demo realism

on:
  push:
    branches:
      - feat/arsas-realistic-demo
    paths:
      - scripts/apply-arsas-rebrand-demo.py
      - .github/workflows/apply-arsas-rebrand-demo.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/arsas-realistic-demo
          fetch-depth: 0
      - name: Apply source corrections
        run: python3 scripts/apply-arsas-rebrand-demo.py
      - name: Commit generated changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: rebrand as ARSAS and make communication demo fully interactive"
          git push origin HEAD:feat/arsas-realistic-demo

# Triggered intentionally after the patch script was committed.
