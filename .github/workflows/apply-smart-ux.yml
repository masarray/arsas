name: Apply smart command/card patch

on:
  push:
    branches: [ fix/smart-command-card-reporting ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: ${{ github.event_name == 'pull_request' || (!contains(github.event.head_commit.message, '[smart-ux-applied]') && !contains(github.event.head_commit.message, '[patch-debug]')) }}
    runs-on: windows-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: fix/smart-command-card-reporting
          fetch-depth: 0

      - name: Inspect patch transport lengths
        shell: powershell
        run: |
          $parts = Get-ChildItem .\tools\smart-ux-patch.part*.b64 | Sort-Object Name
          $lines = @()
          foreach ($part in $parts) {
            $value = (Get-Content $part.FullName -Raw).Trim()
            $lines += "$($part.Name)=$($value.Length)"
          }
          $encoded = ($parts | ForEach-Object { (Get-Content $_.FullName -Raw).Trim() }) -join ''
          $lines += "encoded=$($encoded.Length)"
          $lines += "mod4=$($encoded.Length % 4)"
          try {
            $bytes = [Convert]::FromBase64String($encoded)
            $patch = Join-Path $env:RUNNER_TEMP 'smart-command-card-reporting.patch'
            [IO.File]::WriteAllBytes($patch, $bytes)
            $hash = (Get-FileHash $patch -Algorithm SHA256).Hash.ToLowerInvariant()
            $lines += "decoded=$($bytes.Length)"
            $lines += "sha256=$hash"
          }
          catch {
            $lines += "decodeError=$($_.Exception.Message)"
          }
          $lines | Set-Content .\patch-transport-debug.txt
          $lines | ForEach-Object { Write-Host $_ }

      - name: Commit transport diagnostics
        shell: powershell
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add patch-transport-debug.txt
          git commit -m 'chore: record patch transport diagnostics [patch-debug]'
          git push origin HEAD:fix/smart-command-card-reporting
