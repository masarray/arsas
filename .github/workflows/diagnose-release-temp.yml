name: Apply ARSAS release publication correction

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-release-temp.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Correct release existence probe and retrigger publication
        shell: python
        run: |
          from pathlib import Path
          import json

          workflow = Path('.github/workflows/release-windows.yml')
          text = workflow.read_text(encoding='utf-8')
          old = '          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null\n'
          new = '          $null = cmd /c "gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY >NUL 2>NUL"\n'
          if text.count(old) != 1:
              raise SystemExit(f'Expected one release probe, found {text.count(old)}')
          workflow.write_text(text.replace(old, new), encoding='utf-8')

          manifest_path = Path('.release/windows.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          if manifest.get('version') != '1.6.18':
              raise SystemExit(f"Unexpected release version: {manifest.get('version')}")
          manifest['publicationRequest'] = 6
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')

          Path('.github/workflows/diagnose-release-temp.yml').unlink()
      - name: Commit release workflow correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix GitHub Release existence probe for ARSAS 1.6.18"
          git push origin HEAD:${GITHUB_HEAD_REF}
