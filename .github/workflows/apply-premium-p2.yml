name: Apply premium P2 UI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'fix/premium-p2-ui' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/premium-p2-ui
          fetch-depth: 0

      - name: Decode and apply P2 source transform
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib, zlib
          payload = Path('.staging/p2/apply.zlib.b64').read_text(encoding='utf-8').strip()
          compressed = base64.b64decode(payload, validate=True)
          digest = hashlib.sha256(compressed).hexdigest()
          expected = '36461cabc5a6e5063228e37e5907fac08190495771972f2dfa303c1986dd79bc'
          if digest != expected:
              raise SystemExit(f'P2 transform digest mismatch: {digest}')
          Path('/tmp/apply_p2.py').write_bytes(zlib.decompress(compressed))
          PY
          python3 /tmp/apply_p2.py

      - name: Validate P2 invariants
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          for path in ('App.xaml', 'MainWindow.xaml', 'SaveSclWindow.xaml'):
              ET.parse(path)

          app = Path('App.xaml').read_text(encoding='utf-8')
          main = Path('MainWindow.xaml').read_text(encoding='utf-8')
          save = Path('SaveSclWindow.xaml').read_text(encoding='utf-8')
          save_cs = Path('SaveSclWindow.xaml.cs').read_text(encoding='utf-8')

          item_style = main.split('<ListBox.ItemContainerStyle>', 1)[1].split('</ListBox.ItemContainerStyle>', 1)[0]
          if 'RenderTransform' in item_style or 'ScaleTransform' in item_style:
              raise SystemExit('IED card hover or selection still changes geometry')

          for key in ('PrimaryButton', 'SoftButton', 'IedIconButton', 'SegmentedNavButton', 'RuntimeSegmentButton'):
              block = app.split(f'<Style x:Key="{key}"', 1)[1].split('</Style>', 1)[0]
              if 'ScaleTransform' in block or 'RenderTransform' in block:
                  raise SystemExit(f'{key} still uses geometry-changing interaction')

          required_app = (
              'x:Key="SurfaceRaised"',
              'x:Key="BorderDefault"',
              'x:Key="KeyboardFocusVisual"',
              'x:Key="PanelTitle"',
              'x:Key="DeviceTitle"',
              'x:Key="ConnectedBadgeStyle"',
          )
          required_main = (
              'Style="{StaticResource InsightPill}"',
              'Style="{StaticResource DeviceTitle}"',
              'Style="{StaticResource ConnectedBadgeStyle}"',
              'Storyboard.TargetName="ConnectedBadge"',
              'Storyboard.TargetName="BusyOverlay"',
              'Content="{Binding ControlPendingConfirmationLabel}"',
              'ScrollViewer.HorizontalScrollBarVisibility="Disabled"',
          )
          for token in required_app:
              if token not in app:
                  raise SystemExit(f'Missing App P2 invariant: {token}')
          for token in required_main:
              if token not in main:
                  raise SystemExit(f'Missing MainWindow P2 invariant: {token}')

          if 'Content="Confirm Open"' in main or 'Content="Confirm Close"' in main:
              raise SystemExit('Atomic single Confirm regressed')
          if '<ComboBox' in save or 'Schema V3.1' in save or 'Schema V1.6' in save:
              raise SystemExit('Save SCL segmented selector regressed')
          if 'x:Name="DialogCard" Opacity="0"' not in save or 'DialogCard.BeginAnimation' not in save_cs:
              raise SystemExit('Save SCL modal fade-in was not applied')
          PY

      - name: Create atomic production commit
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/premium-p2-ui
        shell: bash
        run: |
          set -euo pipefail
          repo="repos/$GITHUB_REPOSITORY"
          base_commit=$(git rev-parse HEAD)
          base_tree=$(gh api "$repo/git/commits/$base_commit" --jq .tree.sha)
          tree_entries='[]'

          add_blob() {
            local path="$1"
            local blob
            blob=$(base64 -w0 "$path" | jq -Rs '{content:.,encoding:"base64"}' | gh api --method POST "$repo/git/blobs" --input - --jq .sha)
            tree_entries=$(jq --arg path "$path" --arg sha "$blob" '. + [{path:$path,mode:"100644",type:"blob",sha:$sha}]' <<<"$tree_entries")
          }

          add_blob App.xaml
          add_blob MainWindow.xaml
          add_blob SaveSclWindow.xaml
          add_blob SaveSclWindow.xaml.cs

          tree_sha=$(jq -n --arg base_tree "$base_tree" --argjson tree "$tree_entries" '{base_tree:$base_tree,tree:$tree}' | gh api --method POST "$repo/git/trees" --input - --jq .sha)
          commit_sha=$(jq -n --arg tree "$tree_sha" --arg parent "$base_commit" '{message:"style: deliver premium P2 theme and motion system",tree:$tree,parents:[$parent]}' | gh api --method POST "$repo/git/commits" --input - --jq .sha)
          jq -n --arg sha "$commit_sha" '{sha:$sha,force:false}' | gh api --method PATCH "$repo/git/refs/heads/$TARGET_BRANCH" --input - >/dev/null
          echo "Published $commit_sha"
