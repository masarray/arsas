name: Run control first-click and report dchg fix

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/control-first-click-report-dchg
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply reviewed patch from source workflow
        shell: bash
        run: |
          grep '^H4sI' .github/workflows/apply-control-first-click-report-dchg.yml > /tmp/control-first-click.patch.gz.b64
          base64 -d /tmp/control-first-click.patch.gz.b64 | gzip -d > /tmp/control-first-click.patch
          python - <<'PY'
          from pathlib import Path
          for name in [
              'MainWindow.CommandPanelUx.cs',
              'MainWindow.xaml.cs',
              'Services/Iec61850MonitorRuntime.cs',
              'Services/NativeIec61850Client.cs',
          ]:
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              path.write_text(text, encoding='utf-8', newline='\n')
          PY
          set +e
          git apply --check --verbose --ignore-space-change --ignore-whitespace --recount /tmp/control-first-click.patch > control-first-click-apply.log 2>&1
          status=$?
          cat control-first-click-apply.log
          if [ $status -ne 0 ]; then
            if [ ! -f docs/control-first-click-apply-diagnostic.txt ]; then
              cp control-first-click-apply.log docs/control-first-click-apply-diagnostic.txt
              git config user.name 'github-actions[bot]'
              git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
              git add docs/control-first-click-apply-diagnostic.txt
              git commit -m 'ci: capture first-click patch failure [patch-diagnostic]'
              git push origin HEAD:fix/control-first-click-report-dchg
            fi
            exit $status
          fi
          git apply --verbose --ignore-space-change --ignore-whitespace --recount /tmp/control-first-click.patch

      - name: Commit source changes
        shell: pwsh
        run: |
          git rm .github/workflows/apply-control-first-click-report-dchg.yml
          git rm .github/workflows/run-control-first-click-report-dchg-pr.yml
          if (Test-Path 'docs/control-first-click-apply-diagnostic.txt') { git rm docs/control-first-click-apply-diagnostic.txt }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MainWindow.CommandPanelUx.cs MainWindow.xaml.cs Services/Iec61850MonitorRuntime.cs Services/NativeIec61850Client.cs
          git commit -m 'fix: prioritize first-click control and enforce dynamic dchg [control-first-click-dchg-applied]'
          git push origin HEAD:fix/control-first-click-report-dchg
