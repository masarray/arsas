name: Measure product website

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: Aggregated reporting window in days
        required: false
        default: "28"
        type: choice
        options: ["7", "28", "60", "90"]
  pull_request:
    branches: [ main ]
    paths:
      - "landing/**"
      - "scripts/build-product-site.py"
      - "scripts/generate-privacy-pages.py"
      - "scripts/stamp-site-build.py"
      - "scripts/verify-pages-deployment.py"
      - "scripts/inject-site-measurement.py"
      - "scripts/validate-site-measurement.py"
      - "scripts/check-site-health.py"
      - "scripts/build-site-measurement-report.py"
      - ".github/workflows/site-measurement.yml"
      - ".github/workflows/pages.yml"
  push:
    branches: [ main ]
    paths:
      - "landing/**"
      - "scripts/build-product-site.py"
      - "scripts/generate-privacy-pages.py"
      - "scripts/stamp-site-build.py"
      - "scripts/verify-pages-deployment.py"
      - "scripts/inject-site-measurement.py"
      - "scripts/validate-site-measurement.py"
      - "scripts/check-site-health.py"
      - "scripts/build-site-measurement-report.py"
      - ".github/workflows/site-measurement.yml"
      - ".github/workflows/pages.yml"

permissions:
  contents: read

concurrency:
  group: site-measurement-${{ github.ref }}
  cancel-in-progress: true

env:
  CANONICAL_ROOT: https://masarray.github.io/arsas/

jobs:
  quality:
    name: Validate measurement, privacy and internal links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install offline report dependency
        run: python -m pip install --disable-pip-version-check --quiet requests

      - name: Prepare stable release evidence
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            cp landing/latest.json /tmp/arsas-published.json
          else
            gh api "repos/$GITHUB_REPOSITORY/contents/published.json?ref=release-evidence" --jq .content | base64 -d > /tmp/arsas-published.json
          fi

      - name: Build deterministic website
        run: python scripts/build-product-site.py --output _site --release-evidence /tmp/arsas-published.json

      - name: Generate bilingual privacy pages
        env:
          GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID }}
        run: python scripts/generate-privacy-pages.py --output _site --release-evidence /tmp/arsas-published.json --measurement-id "$GA4_MEASUREMENT_ID"

      - name: Configure optional client measurement
        env:
          GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID }}
        run: python scripts/inject-site-measurement.py _site --measurement-id "$GA4_MEASUREMENT_ID"

      - name: Stamp source and workflow attestation
        shell: bash
        run: |
          set -euo pipefail
          commit_timestamp="$(git show -s --format=%cI "$GITHUB_SHA")"
          python scripts/stamp-site-build.py _site \
            --source-commit "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --commit-timestamp "$commit_timestamp" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT"

      - name: Validate page, consent, privacy, download, language, 404 and Web Vitals measurement
        env:
          GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID }}
        run: python scripts/validate-site-measurement.py _site --measurement-id "$GA4_MEASUREMENT_ID"

      - name: Check internal links and fragments
        id: local_health
        continue-on-error: true
        run: python scripts/check-site-health.py --site _site --output _measurement

      - name: Exercise reporting without credentials or network data
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ""
          GA4_PROPERTY_ID: ""
          GSC_SITE_URL: https://masarray.github.io/arsas/
          PAGESPEED_URLS: ""
          GITHUB_STEP_SUMMARY: ""
        run: python scripts/build-site-measurement-report.py --site _site --output _measurement/offline --days 7

      - name: Add local health summary
        if: always()
        shell: bash
        run: |
          if [ -f _measurement/site-health.md ]; then
            cat _measurement/site-health.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-measurement-quality
          path: _measurement/
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce link health
        if: steps.local_health.outcome != 'success'
        run: exit 1

  insights:
    name: Build private traffic, search and Web Vitals report
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install read-only reporting dependencies
        run: python -m pip install --disable-pip-version-check --quiet google-auth requests

      - name: Prepare stable release evidence
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh api "repos/$GITHUB_REPOSITORY/contents/published.json?ref=release-evidence" --jq .content | base64 -d > /tmp/arsas-published.json

      - name: Build current website
        run: python scripts/build-product-site.py --output _site --release-evidence /tmp/arsas-published.json

      - name: Generate bilingual privacy pages
        env:
          GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID }}
        run: python scripts/generate-privacy-pages.py --output _site --release-evidence /tmp/arsas-published.json --measurement-id "$GA4_MEASUREMENT_ID"

      - name: Configure current client measurement
        env:
          GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID }}
        run: python scripts/inject-site-measurement.py _site --measurement-id "$GA4_MEASUREMENT_ID"

      - name: Stamp reporting build attestation
        shell: bash
        run: |
          set -euo pipefail
          commit_timestamp="$(git show -s --format=%cI "$GITHUB_SHA")"
          python scripts/stamp-site-build.py _site \
            --source-commit "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --commit-timestamp "$commit_timestamp" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT"

      - name: Check deployed pages, privacy routes, release assets and 404 response
        id: deployed_health
        continue-on-error: true
        run: python scripts/check-site-health.py --site _site --output _measurement --remote --base-url "$CANONICAL_ROOT"

      - name: Build aggregated measurement report
        id: measurement
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL || 'https://masarray.github.io/arsas/' }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          PAGESPEED_URLS: ${{ vars.PAGESPEED_URLS || 'https://masarray.github.io/arsas/,https://masarray.github.io/arsas/download.html,https://masarray.github.io/arsas/smart-reporting.html,https://masarray.github.io/arsas/guides.html,https://masarray.github.io/arsas/id.html,https://masarray.github.io/arsas/unduh.html' }}
          REPORT_DAYS: ${{ inputs.days || '28' }}
        shell: bash
        run: python scripts/build-site-measurement-report.py --site _site --output _measurement --days "$REPORT_DAYS"

      - name: Add deployed health summary
        if: always()
        shell: bash
        run: |
          if [ -f _measurement/site-health.md ]; then
            cat _measurement/site-health.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload private measurement evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-measurement-${{ github.run_number }}
          path: _measurement/
          if-no-files-found: error
          retention-days: 90

      - name: Enforce measurement execution
        if: steps.measurement.outcome != 'success'
        run: exit 1

      - name: Enforce deployed link and 404 health
        if: steps.deployed_health.outcome != 'success'
        run: exit 1
