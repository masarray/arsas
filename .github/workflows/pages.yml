name: Deploy product website

on:
  push:
    branches: [ main ]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required website files
        shell: bash
        run: |
          set -euo pipefail
          test -f landing/index.html
          test -f landing/features.html
          test -f landing/control.html
          test -f landing/architecture.html
          test -f landing/styles.css
          test -f landing/app.js
          test -f landing/robots.txt
          test -f landing/sitemap.xml
          test -f landing/site.webmanifest
          test -f landing/assets/hero.svg
          test -f landing/assets/social-card.svg
          ! grep -R --line-number --fixed-strings 'LICENSE-APACHE-2.0' landing
          ! grep -R --line-number 'http://' landing --include='*.html' --include='*.xml' --include='*.json'

      - name: Upload website artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
