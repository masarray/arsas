name: Deploy product website

on:
  push:
    branches: [ main ]
    paths:
      - "landing/**"
      - "scripts/validate-landing.py"
      - "scripts/build-landing.py"
      - "scripts/validate-built-landing.py"
      - ".github/workflows/pages.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "landing/**"
      - "scripts/validate-landing.py"
      - "scripts/build-landing.py"
      - "scripts/validate-built-landing.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate source HTML, links and SEO metadata
        run: python scripts/validate-landing.py

      - name: Build deployable website with local media
        run: python scripts/build-landing.py --output _site

      - name: Sync verified stable updater manifest
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/contents/published.json?ref=release-evidence" --jq .content | base64 -d > /tmp/arsas-published.json
          python - <<'PY'
          import json
          from pathlib import Path

          evidence = json.loads(Path('/tmp/arsas-published.json').read_text())
          installer = evidence['installer']
          manifest = {
              'schemaVersion': 1,
              'product': 'ARSAS',
              'version': evidence['version'],
              'channel': evidence['channel'],
              'publishedAtUtc': evidence['publishedAtUtc'],
              'installer': {
                  'name': installer['name'],
                  'url': installer['url'],
                  'sha256': installer['sha256'],
                  'sizeBytes': installer['sizeBytes'],
              },
          }
          Path('_site/latest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          PY

      - name: Validate local screenshots, social preview, downloads and updater manifest
        run: python scripts/validate-built-landing.py _site

      - name: Verify public website boundaries
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R --line-number --fixed-strings 'LICENSE-APACHE-2.0' _site
          ! grep -R --line-number -E '(href|src|content)="http://' _site --include='*.html'
          ! grep -R --line-number --fixed-strings 'raw.githubusercontent.com/masarray/arsas/main/Assets/screenshot' _site --include='*.html'

      - name: Upload website artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
