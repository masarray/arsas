name: Kick command card follow-up

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  kick:
    runs-on: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/command-dispatch-icon-compact
          fetch-depth: 0

      - name: Trigger push workflow once
        shell: pwsh
        run: |
          $marker = '.github/command-card-followup.trigger'
          if (Test-Path $marker) {
            Write-Host 'Follow-up push already triggered.'
            exit 0
          }
          Set-Content -Path $marker -Value 'triggered' -NoNewline
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add $marker
          git commit -m 'ci: trigger command card source patch [followup-kick]'
          git push origin HEAD:fix/command-dispatch-icon-compact
