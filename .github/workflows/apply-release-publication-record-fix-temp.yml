name: Verify published ARSAS 1.6.18 release

on:
  pull_request:
    paths:
      - ".github/workflows/apply-release-publication-record-fix-temp.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Read release and download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v1.6.18 --repo "$GITHUB_REPOSITORY" \
            --json tagName,name,isLatest,isPrerelease,isDraft,publishedAt,url,targetCommitish,assets \
            > release.json
          mkdir release-assets
          gh release download v1.6.18 --repo "$GITHUB_REPOSITORY" \
            --pattern "ARSAS-Windows-x64-SHA256SUMS.txt" \
            --dir release-assets
          cat release.json
          cat release-assets/ARSAS-Windows-x64-SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: verified-arsas-1.6.18-release
          path: |
            release.json
            release-assets/ARSAS-Windows-x64-SHA256SUMS.txt
