name: Fault Record Feature Validation

on:
  push:
    branches:
      - feat/fault-record-download

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout ARSAS
        uses: actions/checkout@v4
        with:
          path: workspace/arsas

      - name: Checkout ARIEC61850 feature engine
        uses: actions/checkout@v4
        with:
          repository: masarray/ARIEC61850
          ref: feat/fault-record-file-transfer
          path: workspace/ARIEC61850

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\workspace\arsas\ArIED61850Tester.csproj

      - name: Build
        run: dotnet build .\workspace\arsas\ArIED61850Tester.csproj -c Release --no-restore
