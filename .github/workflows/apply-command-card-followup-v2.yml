name: Apply command card follow-up v2

on:
  push:
    branches: [ fix/command-dispatch-icon-compact ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[command-card-v2-applied]') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/command-dispatch-icon-compact
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply source changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def one(text, old, new, label):
              n = text.count(old)
              if n != 1:
                  raise RuntimeError(f'{label}: expected 1, found {n}')
              return text.replace(old, new, 1)

          def rex(text, pattern, new, label):
              text, n = re.subn(pattern, new, text, count=1, flags=re.S)
              if n != 1:
                  raise RuntimeError(f'{label}: expected 1, found {n}')
              return text

          p = Path('MainWindow.xaml')
          x = p.read_text(encoding='utf-8')
          x = one(x, '<ColumnDefinition Width="292"/>', '<ColumnDefinition Width="250"/>', 'explorer width')
          x = one(x, '<ColumnDefinition Width="14"/>', '<ColumnDefinition Width="12"/>', 'explorer gap')
          x = one(x, '<Border Grid.Column="0" Style="{StaticResource Card}" Padding="12">', '<Border Grid.Column="0" Style="{StaticResource Card}" Padding="10">', 'explorer padding')
          x = one(x, '<Grid MinHeight="82">', '<Grid MinHeight="86">', 'card height')
          x = one(x, '<ColumnDefinition Width="44"/>', '<ColumnDefinition Width="64"/>', 'icon column')
          icon = '''                                                <!-- Large borderless relay / BCU icon; icon color is the connection state. -->
                                                <Grid Grid.Row="0" Grid.RowSpan="2" Grid.Column="0" Width="58" Height="58" Margin="0,-2,6,0" VerticalAlignment="Top" Panel.ZIndex="2">
                                                    <Viewbox Width="55" Height="55" HorizontalAlignment="Center" VerticalAlignment="Center">
                                                        <Path x:Name="RelayDeviceIcon" Data="M 2 0 L 2 20 L 18 20 L 18 0 L 2 0 z M 3 1 L 17 1 L 17 19 L 3 19 L 3 1 z M 5 3 L 5 7 L 15 7 L 15 3 L 5 3 z M 6 4 L 14 4 L 14 6 L 6 6 L 6 4 z M 5 10 L 5 11 L 7 11 L 7 10 L 5 10 z M 9 10 L 9 11 L 11 11 L 11 10 L 9 10 z M 13 10 L 13 11 L 15 11 L 15 10 L 13 10 z M 5 13 L 5 14 L 7 14 L 7 13 L 5 13 z M 9 13 L 9 14 L 11 14 L 11 13 L 9 13 z M 13 13 L 13 14 L 15 14 L 15 13 L 13 13 z M 5 16 L 5 17 L 7 17 L 7 16 L 5 16 z M 9 16 L 9 17 L 11 17 L 11 16 L 9 16 z M 13 16 L 13 17 L 15 17 L 15 16 L 13 16 z" Fill="#EF4444" Stretch="Uniform">
                                                            <Path.Effect><DropShadowEffect BlurRadius="14" ShadowDepth="0" Opacity="0.58" Color="#EF4444"/></Path.Effect>
                                                        </Path>
                                                    </Viewbox>
                                                </Grid>

'''
          x = rex(x, r'\s*<!-- Protection relay / BCU silhouette supplied by the user\. -->.*?</Grid>\s*(?=<StackPanel Grid.Row="0" Grid.Column="1")', '\n' + icon, 'icon block')
          trig = '''                                            <DataTrigger Binding="{Binding IsConnected}" Value="True">
                                                <Setter TargetName="RelayDeviceIcon" Property="Fill" Value="#16A34A"/>
                                                <Setter TargetName="RelayDeviceIcon" Property="Effect"><Setter.Value><DropShadowEffect BlurRadius="15" ShadowDepth="0" Opacity="0.64" Color="#16A34A"/></Setter.Value></Setter>
                                            </DataTrigger>
'''
          x = rex(x, r'\s*<DataTrigger Binding="\{Binding IsConnected\}" Value="True">.*?</DataTrigger>\s*<DataTrigger Binding="\{Binding HasReportStream\}" Value="True">.*?</DataTrigger>\s*<DataTrigger Binding="\{Binding ReportPulseActive\}" Value="True">.*?</DataTrigger>\s*(?=<DataTrigger Binding="\{Binding IsBusy\}" Value="True">)', '\n' + trig, 'status triggers')
          x = one(x, 'VerticalAlignment="Center" Width="238">', 'VerticalAlignment="Center" Width="190">', 'busy width')
          x = one(x, 'MinHeight="28" MaxWidth="224"', 'MinHeight="28" MaxWidth="184"', 'busy text')
          x = one(x, 'Style="{StaticResource DiscoveryProgressBar}" Width="218" Height="8"', 'Style="{StaticResource DiscoveryProgressBar}" Width="178" Height="8"', 'busy progress')
          x = one(x, '<Grid Width="218" Margin="0,5,0,0">', '<Grid Width="178" Margin="0,5,0,0">', 'busy labels')
          p.write_text(x, encoding='utf-8', newline='\n')

          p = Path('MainWindow.xaml.cs')
          c = p.read_text(encoding='utf-8')
          method = r'''    private async Task ExecuteQuickControlAsync(SignalDefinition signal, string requestedValue)
    {
        var device = _signalOwners.TryGetValue(signal, out var owner) ? owner : SelectedDevice;
        if (device == null)
            return;

        if (signal.ControlIsBusy)
        {
            SetStatus($"{device.Name}: {signal.Name} command is already in progress.");
            return;
        }

        if (!CommandTestMode && !LiveControlArmed)
        {
            signal.ControlLastResult = "Enable Live control armed before sending a command.";
            SetStatus("Live control is not armed. Review the selected IED and enable the Command Panel safety switch.");
            return;
        }

        signal.ControlIsBusy = true;
        signal.ControlLastResult = $"Dispatching {requestedValue}…";
        SetStatus($"{device.Name}: dispatching {signal.Name} = {requestedValue}…");
        await Dispatcher.Yield(DispatcherPriority.Render);

        try
        {
            if (!device.IsConnected)
            {
                SetStatus($"{device.Name}: connecting before control…");
                var connected = device.HasDiscoveryCache && device.Signals.Count > 0
                    ? await ConnectUsingSavedModelAsync(device)
                    : await ConnectAndConfigureDeviceAsync(device, openWizard: false);
                if (!connected)
                    return;
            }

            if (signal.ControlModelText == "Auto-detect" || signal.ControlCurrentValue == "-")
            {
                var capabilities = await _runtime.InspectControlAsync(device.DeviceId, signal, _applicationCancellation.Token);
                signal.ControlCurrentValue = capabilities.CurrentValue;
                device.RefreshCommandSignalProjection();
                RebuildControlFeedbackIndex(device);
            }

            var result = await _runtime.ExecuteControlAsync(
                device.DeviceId,
                new Iec61850ControlCommandRequest
                {
                    Signal = signal,
                    ValueText = requestedValue,
                    InterlockCheck = CommandInterlockCheck,
                    SynchroCheck = CommandSynchroCheck,
                    TestMode = CommandTestMode,
                    FeedbackTimeoutMs = signal.IsPositionControl ? 12000 :
                        (signal.IsRaiseOnlyControl || signal.IsLowerOnlyControl || signal.IsRaiseLowerControl) ? 15000 : 8000,
                    CommandTerminationTimeoutMs = 10000,
                    OriginCategory = "Maintenance"
                },
                _applicationCancellation.Token);

            if (!string.IsNullOrWhiteSpace(result.FeedbackValue) && result.FeedbackValue != "-")
                signal.ControlCurrentValue = result.FeedbackValue;

            signal.ControlLastResult = BuildQuickControlResult(result);
            SetStatus($"{device.Name}: {signal.Name} — {signal.ControlLastResult}");
        }
        catch (OperationCanceledException)
        {
            signal.ControlLastResult = "Command cancelled.";
            SetStatus($"{device.Name}: {signal.Name} command cancelled.");
        }
        catch (Exception ex)
        {
            signal.ControlLastResult = $"Command failed: {ex.Message}";
            AddLog("ERROR", device.Name, $"Quick control failed for {signal.ObjectReference}: {ex}");
            SetStatus($"{device.Name}: {signal.Name} command failed — {ex.Message}");
            MarkDiagnosticAlert();
        }
        finally
        {
            signal.ControlIsBusy = false;
        }
    }

    private static string BuildQuickControlResult'''
          c = rex(c, r'    private async Task ExecuteQuickControlAsync\(SignalDefinition signal, string requestedValue\)\s*\{.*?\n    \}\n\n    private static string BuildQuickControlResult', method, 'quick command method')
          p.write_text(c, encoding='utf-8', newline='\n')

          p = Path('Services/NativeIec61850Client.cs')
          n = p.read_text(encoding='utf-8')
          old = 'var status = await control.ReadStatusAsync(cancellationToken).ConfigureAwait(false);'
          if n.count(old) != 2:
              raise RuntimeError(f'status read count={n.count(old)}')
          n = n.replace(old, 'var status = await RunMmsOperationAsync(\n            () => control.ReadStatusAsync(cancellationToken),\n            cancellationToken).ConfigureAwait(false);')
          n = one(n, 'action = await control.OperateAsync(nativeRequest, cancellationToken).ConfigureAwait(false);', 'action = await RunMmsOperationAsync(\n                () => control.OperateAsync(nativeRequest, cancellationToken),\n                cancellationToken).ConfigureAwait(false);', 'operate gate')
          n = one(n, 'var opened = await service.OpenAsync(_session, signal.ObjectReference, cancellationToken).ConfigureAwait(false);', 'var opened = await RunMmsOperationAsync(\n                () => service.OpenAsync(_session, signal.ObjectReference, cancellationToken),\n                cancellationToken).ConfigureAwait(false);', 'control open gate')
          p.write_text(n, encoding='utf-8', newline='\n')
          PY
      - name: Commit source changes
        shell: pwsh
        run: |
          git rm .github/workflows/apply-command-card-followup-v2.yml
          if (Test-Path '.github/workflows/apply-command-card-followup.yml') { git rm .github/workflows/apply-command-card-followup.yml }
          if (Test-Path '.github/workflows/bootstrap-command-card-followup.yml') { git rm .github/workflows/bootstrap-command-card-followup.yml }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MainWindow.xaml MainWindow.xaml.cs Services/NativeIec61850Client.cs
          git commit -m 'fix: deterministic command dispatch and compact relay status icon [command-card-v2-applied]'
          git push origin HEAD:fix/command-dispatch-icon-compact
