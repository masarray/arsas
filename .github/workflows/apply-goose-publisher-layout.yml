name: Apply GOOSE publisher workspace

on:
  push:
    branches:
      - feature/goose-publisher-timeline-inspector
    paths:
      - scripts/apply-goose-publisher-layout.py
      - .github/workflows/apply-goose-publisher-layout.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/goose-publisher-timeline-inspector
          fetch-depth: 0

      - name: Apply source integration
        run: python3 scripts/apply-goose-publisher-layout.py

      - name: Commit generated source changes
        shell: bash
        run: |
          if git diff --quiet -- MainWindow.xaml MainWindow.GooseSubscriber.cs Models/GooseSubscriberModels.cs .github/workflows/build.yml; then
            echo "No generated changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MainWindow.xaml MainWindow.GooseSubscriber.cs Models/GooseSubscriberModels.cs .github/workflows/build.yml
          git commit -m "feat: integrate publisher timeline and GOOSE inspector"
          git push origin HEAD:feature/goose-publisher-timeline-inspector
