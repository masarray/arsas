name: Diagnose GOOSE build

on:
  push:
    branches: [ fix/goose-runtime-and-ied-icon ]
    paths:
      - .github/workflows/diagnose-goose-build.yml
  pull_request:
    branches: [ main ]
    paths:
      - .github/workflows/diagnose-goose-build.yml
      - MainWindow.xaml
      - MainWindow.xaml.cs
      - MainWindow.GooseSubscriber.cs
      - scripts/publish-windows-portable.ps1

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ARIEC61850 engine
        shell: powershell
        run: git clone --quiet --depth 1 --branch main https://github.com/masarray/ARIEC61850.git ..\ARIEC61850
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        shell: powershell
        run: dotnet restore .\ArIED61850Tester.csproj
      - name: Capture build diagnostics
        id: build
        continue-on-error: true
        shell: powershell
        run: |
          dotnet build .\ArIED61850Tester.csproj -c Release --no-restore 2>&1 | Tee-Object -FilePath build-full.log
          $exit = $LASTEXITCODE
          Select-String -Path build-full.log -Pattern ': error |error CS|error MC|error XDG|error MSB' | ForEach-Object { $_.Line } | Set-Content build-errors.txt
          if (-not (Test-Path build-errors.txt) -or (Get-Item build-errors.txt).Length -eq 0) {
            Get-Content build-full.log -Tail 80 | Set-Content build-errors.txt
          }
          "exit_code=$exit" | Add-Content build-errors.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: goose-build-errors
          path: build-errors.txt
