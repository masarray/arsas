name: Finalize ARSAS source migration

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feat/arsas-realistic-demo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/arsas-realistic-demo
          fetch-depth: 0
      - name: Restore standard validation and remove migration helpers
        shell: bash
        run: |
          git fetch origin main --depth 1
          git checkout origin/main -- scripts/verify-source-clean.ps1
          for path in \
            scripts/apply-arsas-rebrand-demo.py \
            scripts/export-arsas-patch-files.py \
            scripts/fix-arsas-generated-source.py; do
            if [ -f "$path" ]; then git rm -f -- "$path"; fi
          done
          if git diff --quiet && git diff --cached --quiet; then
            echo "Migration helpers already removed."
            exit 0
          fi
          git add scripts/verify-source-clean.ps1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: finalize ARSAS source migration"
          git push origin HEAD:feat/arsas-realistic-demo
