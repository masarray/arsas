name: Apply deterministic website evidence fix

on:
  push:
    branches:
      - fix/ci-growth-measurement

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/ci-growth-measurement
          fetch-depth: 0

      - name: Remove mutable release-evidence dependency
        shell: python
        run: |
          from pathlib import Path

          def replace_prepare_steps(filename: str) -> None:
              path = Path(filename)
              lines = path.read_text(encoding="utf-8").splitlines()
              output = []
              replacements = 0
              index = 0
              while index < len(lines):
                  line = lines[index]
                  if line.strip() != "- name: Prepare stable release evidence":
                      output.append(line)
                      index += 1
                      continue

                  indent = line[: len(line) - len(line.lstrip())]
                  output.extend([
                      f"{indent}- name: Prepare deterministic stable release evidence",
                      f"{indent}  shell: bash",
                      f"{indent}  run: cp landing/latest.json /tmp/arsas-published.json",
                  ])
                  replacements += 1
                  index += 1
                  while index < len(lines):
                      candidate = lines[index]
                      if candidate.startswith(indent + "- name:"):
                          break
                      index += 1

              if replacements != 2:
                  raise SystemExit(f"{filename}: expected 2 release-evidence steps, replaced {replacements}")
              path.write_text("\n".join(output) + "\n", encoding="utf-8")

          replace_prepare_steps(".github/workflows/search-growth.yml")
          replace_prepare_steps(".github/workflows/site-measurement.yml")
          Path(".github/workflows/diagnose-red-growth-checks-temp.yml").unlink()

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate search-growth quality path offline
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --quiet requests
          cp landing/latest.json /tmp/arsas-published.json
          python scripts/build-product-site.py --output _site_growth --release-evidence /tmp/arsas-published.json
          python scripts/apply-search-authority.py _site_growth
          python scripts/generate-privacy-pages.py --output _site_growth --release-evidence /tmp/arsas-published.json --measurement-id ""
          python scripts/inject-site-measurement.py _site_growth --measurement-id ""
          python scripts/validate-search-authority.py _site_growth
          python scripts/check-site-health.py --site _site_growth --output _growth/health
          python scripts/check-measurement-readiness.py --output _growth/readiness --strict
          python scripts/build-search-growth-report.py --site _site_growth --output _growth/queue

      - name: Validate site-measurement quality path offline
        run: |
          set -euo pipefail
          cp landing/latest.json /tmp/arsas-published.json
          python scripts/build-product-site.py --output _site_measurement --release-evidence /tmp/arsas-published.json
          python scripts/generate-privacy-pages.py --output _site_measurement --release-evidence /tmp/arsas-published.json --measurement-id ""
          python scripts/inject-site-measurement.py _site_measurement --measurement-id ""
          python scripts/stamp-site-build.py _site_measurement \
            --source-commit "$(git rev-parse HEAD)" \
            --source-ref "refs/heads/fix/ci-growth-measurement" \
            --commit-timestamp "$(git show -s --format=%cI HEAD)" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT"
          python scripts/validate-site-measurement.py _site_measurement --measurement-id ""
          python scripts/check-site-health.py --site _site_measurement --output _measurement
          python scripts/check-measurement-readiness.py --output _measurement/readiness --strict
          GOOGLE_SERVICE_ACCOUNT_JSON="" GOOGLE_APPLICATION_CREDENTIALS="" GA4_PROPERTY_ID="" GSC_SITE_URL="https://masarray.github.io/arsas/" PAGESPEED_URLS="" GITHUB_STEP_SUMMARY="" \
            python scripts/build-site-measurement-report.py --site _site_measurement --output _measurement/offline --days 7
          python scripts/validate-measurement-report.py --report _measurement/offline/measurement.json --readiness _measurement/readiness/readiness.json

      - name: Commit validated workflow correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix deterministic website quality evidence"
          git push origin HEAD:fix/ci-growth-measurement
