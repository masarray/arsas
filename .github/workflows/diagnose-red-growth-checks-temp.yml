name: Diagnose deterministic evidence patch

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-red-growth-checks-temp.yml"

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Capture latest patch workflow failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir diagnostics
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/317381483/runs?branch=fix%2Fci-growth-measurement&event=push&per_page=10" > diagnostics/runs.json
          run_id=$(python - <<'PY'
          import json
          data = json.load(open('diagnostics/runs.json', encoding='utf-8'))
          failed = [r for r in data.get('workflow_runs', []) if r.get('conclusion') == 'failure']
          if not failed:
              raise SystemExit('No failed patch run found')
          print(failed[0]['id'])
          PY
          )
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" > diagnostics/jobs.json
          for job_id in $(python - <<'PY'
          import json
          data = json.load(open('diagnostics/jobs.json', encoding='utf-8'))
          print(' '.join(str(j['id']) for j in data.get('jobs', []) if j.get('conclusion') == 'failure'))
          PY
          ); do
            gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > "diagnostics/job-${job_id}.log"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: deterministic-evidence-patch-diagnostics
          path: diagnostics
