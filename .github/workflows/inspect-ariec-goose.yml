name: Apply GOOSE MainWindow patch

on:
  push:
    branches: [ feature/goose-subscriber ]
    paths:
      - scripts/apply-goose-mainwindow.py
      - .github/workflows/inspect-ariec-goose.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/goose-subscriber
          fetch-depth: 0

      - name: Apply deterministic MainWindow patch
        run: python3 scripts/apply-goose-mainwindow.py

      - name: Commit generated application changes
        shell: bash
        run: |
          rm -f scripts/apply-goose-mainwindow.py
          rm -f .github/workflows/inspect-ariec-goose.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes were required."
            exit 0
          fi
          git commit -m "feat: add GOOSE Subscriber tab and lifecycle integration"
          git push origin HEAD:feature/goose-subscriber
