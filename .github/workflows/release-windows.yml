name: Release ARSAS Windows packages

on:
  push:
    branches: [ main ]
    paths:
      - ".release/windows.json"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.6.16"
        required: true
        default: "1.6.16"
        type: string
      publish_release:
        description: "Create or update a GitHub Release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark a manually published release as pre-release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  ARIEC61850_REF: main

jobs:
  windows-release:
    name: Build ARSAS portable ZIP and installer
    runs-on: windows-latest

    steps:
      - name: Checkout ARSAS application
        uses: actions/checkout@v4
        with:
          path: ArIED61850Tester
          fetch-depth: 0

      - name: Checkout ARIEC61850 engine
        shell: powershell
        run: git clone --quiet --depth 1 --branch $env:ARIEC61850_REF https://github.com/masarray/ARIEC61850.git ARIEC61850

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release version
        id: release
        shell: powershell
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $rawVersion = $env:GITHUB_REF_NAME
          }
          elseif ($env:GITHUB_REF -eq "refs/heads/main") {
            $manifestPath = ".\ArIED61850Tester\.release\windows.json"
            if (-not (Test-Path $manifestPath -PathType Leaf)) {
              throw "Release manifest was not found: $manifestPath"
            }
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $rawVersion = [string]$manifest.version
          }
          else {
            $rawVersion = "${{ inputs.version }}"
          }

          $version = $rawVersion.Trim()
          if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid release version '$rawVersion'. Use semantic versioning such as 1.6.16 or 1.7.0-rc.1."
          }

          [xml]$project = Get-Content ".\ArIED61850Tester\ArIED61850Tester.csproj"
          $projectVersion = [string]$project.Project.PropertyGroup.Version
          if ($projectVersion -ne $version) {
            throw "Release manifest version $version does not match project version $projectVersion."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify source and licensing boundaries
        shell: powershell
        run: .\ArIED61850Tester\scripts\verify-source-clean.ps1

      - name: Publish portable Windows package
        shell: powershell
        run: |
          .\ArIED61850Tester\scripts\publish-windows-portable.ps1 `
            -Version $env:RELEASE_VERSION `
            -Runtime win-x64 `
            -SingleFile $false `
            -SelfContained $true `
            -EngineProject "$env:GITHUB_WORKSPACE\ARIEC61850\src\AR.Iec61850\AR.Iec61850.csproj" `
            -NpcapProject "$env:GITHUB_WORKSPACE\ARIEC61850\src\AR.Iec61850.Transports.Npcap\AR.Iec61850.Transports.Npcap.csproj"

      - name: Install Inno Setup compiler
        shell: powershell
        run: choco install innosetup --no-progress --yes

      - name: Build Windows installer
        shell: powershell
        run: |
          .\ArIED61850Tester\scripts\build-windows-installer.ps1 `
            -Version $env:RELEASE_VERSION `
            -Runtime win-x64 `
            -PublishedDirectory "$env:GITHUB_WORKSPACE\ArIED61850Tester\dist\ARSAS-$env:RELEASE_VERSION-win-x64" `
            -OutputDirectory "$env:GITHUB_WORKSPACE\ArIED61850Tester\dist"

      - name: Smoke-test silent installer and uninstaller
        shell: powershell
        run: |
          $installerPath = ".\ArIED61850Tester\dist\ARSAS-$env:RELEASE_VERSION-win-x64-setup.exe"
          if (-not (Test-Path $installerPath -PathType Leaf)) { throw "Windows installer was not produced: $installerPath" }

          $installRoot = Join-Path $env:RUNNER_TEMP "ARSAS-installer-smoke"
          if (Test-Path $installRoot) { Remove-Item $installRoot -Recurse -Force }

          $installArguments = @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/SP-",
            "/CURRENTUSER",
            "/DIR=$installRoot"
          )
          $install = Start-Process -FilePath $installerPath -ArgumentList $installArguments -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Silent installer failed with exit code $($install.ExitCode)." }

          $requiredInstalledFiles = @(
            "ARSAS.exe",
            "AR.Iec61850.Transports.Npcap.dll",
            "SharpPcap.dll",
            "PacketDotNet.dll"
          )
          foreach ($file in $requiredInstalledFiles) {
            $path = Join-Path $installRoot $file
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Installed package is incomplete: $path"
            }
          }

          $uninstaller = Join-Path $installRoot "unins000.exe"
          if (-not (Test-Path $uninstaller -PathType Leaf)) { throw "Installer did not create an uninstaller." }
          $uninstall = Start-Process -FilePath $uninstaller -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART") -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) { throw "Silent uninstall failed with exit code $($uninstall.ExitCode)." }

      - name: Create versioned SHA-256 checksums
        shell: powershell
        run: |
          .\ArIED61850Tester\scripts\create-windows-release-checksums.ps1 `
            -Version $env:RELEASE_VERSION `
            -Runtime win-x64 `
            -DistDirectory "$env:GITHUB_WORKSPACE\ArIED61850Tester\dist"

      - name: Stage stable public download assets
        shell: powershell
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "ArIED61850Tester\dist"
          $versionedInstaller = Join-Path $dist "ARSAS-$env:RELEASE_VERSION-win-x64-setup.exe"
          $versionedPortable = Join-Path $dist "ARSAS-$env:RELEASE_VERSION-win-x64-portable.zip"
          $publicInstaller = Join-Path $dist "ARSAS-Windows-x64-Setup.exe"
          $publicPortable = Join-Path $dist "ARSAS-Windows-x64-Portable.zip"
          $publicChecksums = Join-Path $dist "ARSAS-Windows-x64-SHA256SUMS.txt"

          Copy-Item $versionedInstaller $publicInstaller -Force
          Copy-Item $versionedPortable $publicPortable -Force

          @($publicInstaller, $publicPortable) | ForEach-Object {
            $hash = Get-FileHash $_ -Algorithm SHA256
            "$($hash.Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($_))"
          } | Set-Content -Path $publicChecksums -Encoding ascii

          foreach ($path in @($publicInstaller, $publicPortable, $publicChecksums)) {
            if (-not (Test-Path $path -PathType Leaf)) { throw "Public release asset was not staged: $path" }
          }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ARSAS-${{ steps.release.outputs.version }}-windows
          if-no-files-found: error
          path: |
            ArIED61850Tester/dist/ARSAS-${{ steps.release.outputs.version }}-win-x64-portable.zip
            ArIED61850Tester/dist/ARSAS-${{ steps.release.outputs.version }}-win-x64-setup.exe
            ArIED61850Tester/dist/SHA256SUMS.txt
            ArIED61850Tester/dist/ARSAS-Windows-x64-Portable.zip
            ArIED61850Tester/dist/ARSAS-Windows-x64-Setup.exe
            ArIED61850Tester/dist/ARSAS-Windows-x64-SHA256SUMS.txt

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag' || github.ref == 'refs/heads/main' || inputs.publish_release == true
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "ArIED61850Tester\dist"
          $assets = @(
            (Join-Path $dist "ARSAS-Windows-x64-Setup.exe")
            (Join-Path $dist "ARSAS-Windows-x64-Portable.zip")
            (Join-Path $dist "ARSAS-Windows-x64-SHA256SUMS.txt")
          )

          $null = cmd /c "gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY >NUL 2>NUL"
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG @assets --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -ne 0) { throw "Failed to update GitHub Release assets." }
            gh release edit $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --title "ARSAS $env:RELEASE_VERSION" --latest
            if ($LASTEXITCODE -ne 0) { throw "Failed to mark the GitHub Release as latest." }
            exit 0
          }

          $arguments = @(
            "release", "create", $env:RELEASE_TAG,
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", $env:GITHUB_SHA,
            "--title", "ARSAS $env:RELEASE_VERSION",
            "--generate-notes",
            "--latest"
          )
          if ($env:RELEASE_VERSION.Contains("-") -or ($env:GITHUB_REF_TYPE -ne "tag" -and $env:GITHUB_REF -ne "refs/heads/main" -and $env:MANUAL_PRERELEASE -eq "true")) {
            $arguments += "--prerelease"
          }
          $arguments += $assets

          & gh @arguments
          if ($LASTEXITCODE -ne 0) { throw "Failed to create GitHub Release." }

      - name: Record verified release publication
        if: github.ref_type == 'tag' || github.ref == 'refs/heads/main' || inputs.publish_release == true
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "ArIED61850Tester\dist"
          $installer = Join-Path $dist "ARSAS-Windows-x64-Setup.exe"
          $portable = Join-Path $dist "ARSAS-Windows-x64-Portable.zip"
          $checksums = Join-Path $dist "ARSAS-Windows-x64-SHA256SUMS.txt"

          $record = [ordered]@{
            version = $env:RELEASE_VERSION
            tag = $env:RELEASE_TAG
            channel = "stable"
            publishedAtUtc = [DateTime]::UtcNow.ToString("o")
            sourceCommit = $env:GITHUB_SHA
            installer = [ordered]@{
              name = "ARSAS-Windows-x64-Setup.exe"
              url = "https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download/ARSAS-Windows-x64-Setup.exe"
              sha256 = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLowerInvariant()
              sizeBytes = (Get-Item $installer).Length
            }
            portable = [ordered]@{
              name = "ARSAS-Windows-x64-Portable.zip"
              url = "https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download/ARSAS-Windows-x64-Portable.zip"
              sha256 = (Get-FileHash $portable -Algorithm SHA256).Hash.ToLowerInvariant()
              sizeBytes = (Get-Item $portable).Length
            }
            checksums = [ordered]@{
              name = "ARSAS-Windows-x64-SHA256SUMS.txt"
              url = "https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download/ARSAS-Windows-x64-SHA256SUMS.txt"
              sizeBytes = (Get-Item $checksums).Length
            }
          }

          $json = $record | ConvertTo-Json -Depth 5
          $content = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($json + "`n"))
          $apiPath = "repos/$env:GITHUB_REPOSITORY/contents/.release/published.json"
          $existingSha = $null
          $existing = gh api $apiPath 2>$null
          if ($LASTEXITCODE -eq 0 -and $existing) {
            $existingSha = ($existing | ConvertFrom-Json).sha
          }

          $body = [ordered]@{
            message = "chore: record published ARSAS $env:RELEASE_VERSION release"
            content = $content
            branch = "main"
          }
          if ($existingSha) { $body.sha = $existingSha }

          $request = $body | ConvertTo-Json -Compress
          $request | gh api --method PUT $apiPath --input - *> $null
          if ($LASTEXITCODE -ne 0) { throw "Failed to record verified release publication." }
