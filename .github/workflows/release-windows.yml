name: Release Windows packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.6.16"
        required: true
        default: "1.6.16"
        type: string
      publish_release:
        description: "Create or update a GitHub Release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark a manually published release as pre-release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  ARIEC61850_REF: main

jobs:
  windows-release:
    name: Build portable ZIP and installer
    runs-on: windows-latest

    steps:
      - name: Checkout ArIED application
        uses: actions/checkout@v4
        with:
          path: ArIED61850Tester
          fetch-depth: 0

      - name: Checkout ARIEC61850 engine
        shell: powershell
        run: git clone --quiet --depth 1 --branch $env:ARIEC61850_REF https://github.com/masarray/ARIEC61850.git ARIEC61850

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release version
        id: release
        shell: powershell
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $rawVersion = $env:GITHUB_REF_NAME
          }
          else {
            $rawVersion = "${{ inputs.version }}"
          }

          $version = $rawVersion.Trim()
          if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid release version '$rawVersion'. Use semantic versioning such as 1.6.16 or 1.7.0-rc.1."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify source and licensing boundaries
        shell: powershell
        run: .\ArIED61850Tester\scripts\verify-source-clean.ps1

      - name: Publish portable Windows package
        shell: powershell
        run: |
          .\ArIED61850Tester\scripts\publish-windows-portable.ps1 `
            -Version $env:RELEASE_VERSION `
            -Runtime win-x64 `
            -SingleFile $false `
            -SelfContained $true `
            -EngineProject "$env:GITHUB_WORKSPACE\ARIEC61850\src\AR.Iec61850\AR.Iec61850.csproj" `
            -NpcapProject "$env:GITHUB_WORKSPACE\ARIEC61850\src\AR.Iec61850.Transports.Npcap\AR.Iec61850.Transports.Npcap.csproj"

      - name: Install Inno Setup compiler
        shell: powershell
        run: choco install innosetup --no-progress --yes

      - name: Build Windows installer
        shell: powershell
        run: |
          .\ArIED61850Tester\scripts\build-windows-installer.ps1 `
            -Version $env:RELEASE_VERSION `
            -Runtime win-x64 `
            -PublishedDirectory "$env:GITHUB_WORKSPACE\ArIED61850Tester\dist\ArIED61850-$env:RELEASE_VERSION-win-x64" `
            -OutputDirectory "$env:GITHUB_WORKSPACE\ArIED61850Tester\dist"

      - name: Smoke-test silent installer and uninstaller
        shell: powershell
        run: |
          $installerPath = ".\ArIED61850Tester\dist\ArIED61850-$env:RELEASE_VERSION-win-x64-setup.exe"
          if (-not (Test-Path $installerPath -PathType Leaf)) { throw "Windows installer was not produced: $installerPath" }

          $installRoot = Join-Path $env:RUNNER_TEMP "ArIED61850-installer-smoke"
          if (Test-Path $installRoot) { Remove-Item $installRoot -Recurse -Force }

          $installArguments = @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/SP-",
            "/CURRENTUSER",
            "/DIR=$installRoot"
          )
          $install = Start-Process -FilePath $installerPath -ArgumentList $installArguments -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Silent installer failed with exit code $($install.ExitCode)." }

          $requiredInstalledFiles = @(
            "ArIED61850.exe",
            "AR.Iec61850.Transports.Npcap.dll",
            "SharpPcap.dll",
            "PacketDotNet.dll"
          )
          foreach ($file in $requiredInstalledFiles) {
            $path = Join-Path $installRoot $file
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Installed package is incomplete: $path"
            }
          }

          $uninstaller = Join-Path $installRoot "unins000.exe"
          if (-not (Test-Path $uninstaller -PathType Leaf)) { throw "Installer did not create an uninstaller." }
          $uninstall = Start-Process -FilePath $uninstaller -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART") -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) { throw "Silent uninstall failed with exit code $($uninstall.ExitCode)." }

      - name: Create SHA-256 checksums
        shell: powershell
        run: |
          .\ArIED61850Tester\scripts\create-windows-release-checksums.ps1 `
            -Version $env:RELEASE_VERSION `
            -Runtime win-x64 `
            -DistDirectory "$env:GITHUB_WORKSPACE\ArIED61850Tester\dist"

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ArIED61850-${{ steps.release.outputs.version }}-windows
          if-no-files-found: error
          path: |
            ArIED61850Tester/dist/ArIED61850-${{ steps.release.outputs.version }}-win-x64-portable.zip
            ArIED61850Tester/dist/ArIED61850-${{ steps.release.outputs.version }}-win-x64-setup.exe
            ArIED61850Tester/dist/SHA256SUMS.txt

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag' || inputs.publish_release == true
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "ArIED61850Tester\dist"
          $assets = @(
            (Join-Path $dist "ArIED61850-$env:RELEASE_VERSION-win-x64-portable.zip")
            (Join-Path $dist "ArIED61850-$env:RELEASE_VERSION-win-x64-setup.exe")
            (Join-Path $dist "SHA256SUMS.txt")
          )

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG @assets --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -ne 0) { throw "Failed to update GitHub Release assets." }
            exit 0
          }

          $arguments = @(
            "release", "create", $env:RELEASE_TAG,
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", $env:GITHUB_SHA,
            "--title", "ArIED 61850 $env:RELEASE_VERSION",
            "--generate-notes"
          )
          if ($env:RELEASE_VERSION.Contains("-") -or ($env:GITHUB_REF_TYPE -ne "tag" -and $env:MANUAL_PRERELEASE -eq "true")) {
            $arguments += "--prerelease"
          }
          $arguments += $assets

          & gh @arguments
          if ($LASTEXITCODE -ne 0) { throw "Failed to create GitHub Release." }
