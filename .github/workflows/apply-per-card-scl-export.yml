name: Apply per-card SCL export

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'feat/per-card-scl-export' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/per-card-scl-export
          fetch-depth: 0

      - name: Apply and validate reviewed source
        shell: bash
        run: |
          set -euo pipefail
          rm -f SaveSclWindow.xaml SaveSclWindow.xaml.cs docs/SCL_EXPORT.md
          python3 - <<'PY'
          from pathlib import Path
          import base64, zlib
          payload = Path('.staging/apply_scl_export.py.zlib.b64').read_text(encoding='utf-8').strip()
          source = zlib.decompress(base64.b64decode(payload)).decode('utf-8')
          exec(compile(source, 'apply_scl_export.py', 'exec'))
          PY
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse('MainWindow.xaml')
          ET.parse('SaveSclWindow.xaml')
          PY
          grep -q 'Click="IedSaveScl_Click"' MainWindow.xaml
          grep -q 'HorizontalAlignment="Right" VerticalAlignment="Top"' MainWindow.xaml
          grep -q 'InteroperableSclConverter.WriteFiles' MainWindow.xaml.cs
          grep -q 'LiveIedSclExporter.WriteFiles' MainWindow.xaml.cs
          grep -q 'LiveDiscoveryModel' Models/MonitorModels.cs
          grep -q 'LastLiveModel' Services/NativeIec61850Client.cs
          grep -q '<Version>1.6.10</Version>' ArIED61850Tester.csproj
          grep -q 'Content="{Binding ControlPendingConfirmationLabel}"' MainWindow.xaml
          ! grep -q 'Content="Confirm Open"' MainWindow.xaml
          ! grep -q 'Content="Confirm Close"' MainWindow.xaml

      - name: Create atomic production commit
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: feat/per-card-scl-export
        shell: bash
        run: |
          set -euo pipefail
          repo="repos/$GITHUB_REPOSITORY"
          base_commit=$(git rev-parse HEAD)
          base_tree=$(gh api "$repo/git/commits/$base_commit" --jq .tree.sha)
          tree_entries='[]'

          add_blob() {
            local path="$1"
            local content blob
            content=$(base64 -w0 "$path")
            blob=$(jq -n --arg content "$content" '{content:$content,encoding:"base64"}' |
              gh api --method POST "$repo/git/blobs" --input - --jq .sha)
            tree_entries=$(jq --arg path "$path" --arg sha "$blob" \
              '. + [{path:$path,mode:"100644",type:"blob",sha:$sha}]' <<<"$tree_entries")
          }

          add_blob MainWindow.xaml
          add_blob MainWindow.xaml.cs
          add_blob Models/MonitorModels.cs
          add_blob Services/NativeIec61850Client.cs
          add_blob Services/Iec61850MonitorRuntime.cs
          add_blob SaveSclWindow.xaml
          add_blob SaveSclWindow.xaml.cs
          add_blob docs/SCL_EXPORT.md
          add_blob ArIED61850Tester.csproj
          add_blob scripts/publish-windows-portable.ps1

          tree_sha=$(jq -n --arg base_tree "$base_tree" --argjson tree "$tree_entries" \
            '{base_tree:$base_tree,tree:$tree}' |
            gh api --method POST "$repo/git/trees" --input - --jq .sha)
          commit_sha=$(jq -n --arg message "feat: add per-card interoperable SCL export" \
            --arg tree "$tree_sha" --arg parent "$base_commit" \
            '{message:$message,tree:$tree,parents:[$parent]}' |
            gh api --method POST "$repo/git/commits" --input - --jq .sha)
          jq -n --arg sha "$commit_sha" '{sha:$sha,force:false}' |
            gh api --method PATCH "$repo/git/refs/heads/$TARGET_BRANCH" --input - >/dev/null
          echo "Published production commit $commit_sha"
