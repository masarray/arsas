name: Temporary apply RCB card patch

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Add production RCB action to IED card
        shell: python
        run: |
          import re
          from pathlib import Path

          path = Path("MainWindow.xaml")
          text = path.read_text(encoding="utf-8")
          if 'Click="IedEditRcb_Click"' in text:
              print("IED card RCB action already installed.")
              raise SystemExit(0)

          pattern = re.compile(
              r'(?P<indent>[ \t]*)<Button Style="\{StaticResource IedIconButton\}" Tag="\{Binding\}" Click="IedSaveScl_Click"[\s\S]*?</Button>',
              re.MULTILINE)
          match = pattern.search(text)
          if not match:
              raise SystemExit("IED card Save SCL action anchor was not found.")

          indent = match.group('indent')
          rcb = (
              f'{indent}<Button Style="{{StaticResource IedIconButton}}" Tag="{{Binding}}" Click="IedEditRcb_Click"\n'
              f'{indent}        IsEnabled="{{Binding IsActionEnabled}}" ToolTip="RCB Export Filter — keep one RCB for legacy SAS CID import">\n'
              f'{indent}    <Viewbox Width="16" Height="16"><Path Data="{{StaticResource LucideSlidersHorizontal}}" Style="{{StaticResource LucideIcon}}" Stroke="#315DBF"/></Viewbox>\n'
              f'{indent}</Button>\n'
          )
          text = text[:match.start()] + rcb + match.group(0) + text[match.end():]
          path.write_text(text, encoding="utf-8")

      - name: Commit branch patch
        shell: bash
        run: |
          if git diff --quiet -- MainWindow.xaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MainWindow.xaml
          git commit -m "Add RCB export filter action to IED cards"
          git push origin HEAD:${{ github.head_ref }}
