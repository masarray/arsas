name: Apply staged SCL integration

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/use-engine-scl-workspace') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/use-engine-scl-workspace
          fetch-depth: 0

      - name: Apply staged source changes
        shell: bash
        run: |
          set -euo pipefail
          for patch in \
            .integration/mainwindow-1.patch \
            .integration/mainwindow-2.patch \
            .integration/mainwindow-3.patch \
            .integration/mainwindow-4.patch \
            .integration/monitormodels-1.patch \
            .integration/monitormodels-2.patch \
            .integration/mapper.patch \
            .integration/projection.patch
          do
            git apply --check --ignore-space-change --ignore-whitespace "$patch"
            git apply --ignore-space-change --ignore-whitespace "$patch"
          done

          mkdir -p docs
          cp .integration/SCL_WORKSPACE_INTEGRATION.md docs/SCL_WORKSPACE_INTEGRATION.md
          rm Services/SclImportService.cs
          rm -rf .integration

      - name: Commit final integration source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate engine-owned SCL workspace [applied]"
          git push origin HEAD:agent/use-engine-scl-workspace
