name: Apply per-signal control safety UX

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/per-signal-control-safety

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/per-signal-control-safety
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply and validate control safety UX
        shell: pwsh
        run: |
          python tools/apply_per_signal_control_safety.py
          python -c "import xml.etree.ElementTree as E; E.parse('App.xaml'); E.parse('MainWindow.xaml'); print('XAML XML validation passed')"
          git diff --check

      - name: Commit generated source changes
        shell: pwsh
        run: |
          git rm tools/apply_per_signal_control_safety.py
          git rm .github/workflows/apply-per-signal-control-safety.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Models/SignalDefinition.cs MainWindow.xaml MainWindow.xaml.cs MainWindow.CommandPanelUx.cs README.md
          git commit -m 'feat: add per-signal control checks and command confirmation'
          git push origin HEAD:feat/per-signal-control-safety
