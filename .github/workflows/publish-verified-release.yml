name: Publish verified ARSAS Windows release

on:
  pull_request:
    branches: [ main ]
    paths:
      - ".release/publish-verified.json"
      - ".github/workflows/publish-verified-release.yml"
  push:
    branches: [ main ]
    paths:
      - ".release/publish-verified.json"
      - ".github/workflows/publish-verified-release.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  verified-release:
    name: Verify tested artifacts and publish stable downloads
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read verified publication request
        id: request
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          request = json.loads(Path('.release/publish-verified.json').read_text())
          required = (
              'version', 'installerArtifactId', 'installerSha256',
              'portableArtifactId', 'portableSha256'
          )
          missing = [key for key in required if not request.get(key)]
          if missing:
              raise SystemExit('Missing publication request fields: ' + ', '.join(missing))

          print(f"version={request['version']}")
          print(f"tag=v{request['version']}")
          print(f"installer_artifact_id={request['installerArtifactId']}")
          print(f"installer_sha256={request['installerSha256'].lower()}")
          print(f"portable_artifact_id={request['portableArtifactId']}")
          print(f"portable_sha256={request['portableSha256'].lower()}")
          PY

      - name: Download tested workflow artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALLER_ARTIFACT_ID: ${{ steps.request.outputs.installer_artifact_id }}
          PORTABLE_ARTIFACT_ID: ${{ steps.request.outputs.portable_artifact_id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verified/installer verified/portable
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$INSTALLER_ARTIFACT_ID/zip" > verified/installer-artifact.zip
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$PORTABLE_ARTIFACT_ID/zip" > verified/portable-artifact.zip
          unzip -q verified/installer-artifact.zip -d verified/installer
          unzip -q verified/portable-artifact.zip -d verified/portable

      - name: Verify exact tested binaries
        env:
          VERSION: ${{ steps.request.outputs.version }}
          INSTALLER_SHA256: ${{ steps.request.outputs.installer_sha256 }}
          PORTABLE_SHA256: ${{ steps.request.outputs.portable_sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          installer="verified/installer/ARSAS-$VERSION-win-x64-setup.exe"
          portable="verified/portable/ARSAS-$VERSION-win-x64-portable.zip"

          test -s "$installer"
          test -s "$portable"

          actual_installer="$(sha256sum "$installer" | awk '{print $1}')"
          actual_portable="$(sha256sum "$portable" | awk '{print $1}')"
          test "$actual_installer" = "$INSTALLER_SHA256"
          test "$actual_portable" = "$PORTABLE_SHA256"

          cp "$installer" verified/ARSAS-Windows-x64-Setup.exe
          cp "$portable" verified/ARSAS-Windows-x64-Portable.zip
          {
            sha256sum verified/ARSAS-Windows-x64-Setup.exe | sed 's#verified/##'
            sha256sum verified/ARSAS-Windows-x64-Portable.zip | sed 's#verified/##'
          } > verified/ARSAS-Windows-x64-SHA256SUMS.txt

      - name: Publish or update stable GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.request.outputs.version }}
          TAG: ${{ steps.request.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          cat > verified/release-notes.md <<EOF
          # ARSAS $VERSION

          Stable Windows x64 release of the ARSAS IEC 61850 engineering workstation.

          Public users should access ARSAS through the product website. The release assets are used only as the direct-download backend for the landing page and the in-app verified updater.

          Included assets:
          - Windows installer
          - Portable Windows ZIP
          - SHA-256 checksums
          EOF

          assets=(
            verified/ARSAS-Windows-x64-Setup.exe
            verified/ARSAS-Windows-x64-Portable.zip
            verified/ARSAS-Windows-x64-SHA256SUMS.txt
          )

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "ARSAS $VERSION" --notes-file verified/release-notes.md \
              --draft=false --prerelease=false --latest
          else
            gh release create "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "ARSAS $VERSION" \
              --notes-file verified/release-notes.md --latest
          fi

      - name: Verify published release assets
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.request.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,assets > verified/release.json
          python - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path('verified/release.json').read_text())
          expected = {
              'ARSAS-Windows-x64-Setup.exe',
              'ARSAS-Windows-x64-Portable.zip',
              'ARSAS-Windows-x64-SHA256SUMS.txt',
          }
          names = {asset['name'] for asset in release.get('assets', []) if asset.get('size', 0) > 0}
          missing = sorted(expected - names)
          if release.get('isDraft') or release.get('isPrerelease'):
              raise SystemExit('Stable release is unexpectedly draft or prerelease')
          if missing:
              raise SystemExit('Published release is missing assets: ' + ', '.join(missing))
          PY

      - name: Write independently auditable publication evidence
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.request.outputs.version }}
          TAG: ${{ steps.request.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          installer_sha="$(sha256sum verified/ARSAS-Windows-x64-Setup.exe | awk '{print $1}')"
          portable_sha="$(sha256sum verified/ARSAS-Windows-x64-Portable.zip | awk '{print $1}')"
          installer_size="$(stat -c %s verified/ARSAS-Windows-x64-Setup.exe)"
          portable_size="$(stat -c %s verified/ARSAS-Windows-x64-Portable.zip)"

          python - <<PY > verified/published.json
          import json
          from datetime import datetime, timezone

          print(json.dumps({
              'version': '$VERSION',
              'tag': '$TAG',
              'channel': 'stable',
              'publishedAtUtc': datetime.now(timezone.utc).isoformat(),
              'sourceCommit': '$GITHUB_SHA',
              'installer': {
                  'name': 'ARSAS-Windows-x64-Setup.exe',
                  'url': 'https://github.com/$GITHUB_REPOSITORY/releases/latest/download/ARSAS-Windows-x64-Setup.exe',
                  'sha256': '$installer_sha',
                  'sizeBytes': int('$installer_size'),
              },
              'portable': {
                  'name': 'ARSAS-Windows-x64-Portable.zip',
                  'url': 'https://github.com/$GITHUB_REPOSITORY/releases/latest/download/ARSAS-Windows-x64-Portable.zip',
                  'sha256': '$portable_sha',
                  'sizeBytes': int('$portable_size'),
              },
              'checksums': {
                  'name': 'ARSAS-Windows-x64-SHA256SUMS.txt',
                  'url': 'https://github.com/$GITHUB_REPOSITORY/releases/latest/download/ARSAS-Windows-x64-SHA256SUMS.txt',
              },
          }, indent=2))
          PY

          main_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)"
          if ! gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/release-evidence" >/dev/null 2>&1; then
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref='refs/heads/release-evidence' -f sha="$main_sha" >/dev/null
          fi

          content="$(base64 -w0 verified/published.json)"
          api_path="repos/$GITHUB_REPOSITORY/contents/published.json"
          existing_sha="$(gh api "$api_path?ref=release-evidence" --jq .sha 2>/dev/null || true)"
          args=(-f message="Record verified ARSAS $VERSION publication" -f content="$content" -f branch=release-evidence)
          if [ -n "$existing_sha" ]; then args+=(-f sha="$existing_sha"); fi
          gh api --method PUT "$api_path" "${args[@]}" >/dev/null

      - name: Refresh product website updater manifest
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run pages.yml --repo "$GITHUB_REPOSITORY" --ref main
