name: Apply ballistic navigation refinement

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'fix/premium-p2-ui' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/premium-p2-ui
          fetch-depth: 0

      - name: Decode and apply ballistic navigation transform
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib, zlib
          payload = Path('.staging/ballistic/apply.zlib.b64').read_text(encoding='utf-8').strip()
          compressed = base64.b64decode(payload, validate=True)
          digest = hashlib.sha256(compressed).hexdigest()
          expected = '7325cb16be6a7efdbfa595808132f6de2a0056b810317b091cbcf9bacad2fee0'
          if digest != expected:
              raise SystemExit(f'ballistic navigation transform digest mismatch: {digest}')
          Path('/tmp/apply_ballistic_nav.py').write_bytes(zlib.decompress(compressed))
          PY
          python3 /tmp/apply_ballistic_nav.py

      - name: Create atomic production commit
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/premium-p2-ui
        shell: bash
        run: |
          set -euo pipefail
          repo="repos/$GITHUB_REPOSITORY"
          base_commit=$(git rev-parse HEAD)
          base_tree=$(gh api "$repo/git/commits/$base_commit" --jq .tree.sha)
          tree_entries='[]'

          add_blob() {
            local path="$1"
            local blob
            blob=$(base64 -w0 "$path" | jq -Rs '{content:.,encoding:"base64"}' | gh api --method POST "$repo/git/blobs" --input - --jq .sha)
            tree_entries=$(jq --arg path "$path" --arg sha "$blob" '. + [{path:$path,mode:"100644",type:"blob",sha:$sha}]' <<<"$tree_entries")
          }

          add_blob App.xaml
          add_blob MainWindow.xaml
          add_blob MainWindow.xaml.cs
          add_blob ArIED61850Tester.csproj
          add_blob scripts/publish-windows-portable.ps1

          tree_sha=$(jq -n --arg base_tree "$base_tree" --argjson tree "$tree_entries" '{base_tree:$base_tree,tree:$tree}' | gh api --method POST "$repo/git/trees" --input - --jq .sha)
          commit_sha=$(jq -n --arg tree "$tree_sha" --arg parent "$base_commit" '{message:"perf: replace sliding nav with ballistic button states",tree:$tree,parents:[$parent]}' | gh api --method POST "$repo/git/commits" --input - --jq .sha)
          jq -n --arg sha "$commit_sha" '{sha:$sha,force:false}' | gh api --method PATCH "$repo/git/refs/heads/$TARGET_BRANCH" --input - >/dev/null
          echo "Published $commit_sha"
